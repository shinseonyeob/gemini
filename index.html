<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 투두 리스트</title>
    <style>
        /* [CSS] 웹페이지의 디자인을 담당합니다 */
        body {
            font-family: 'Pretendard', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .todo-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 350px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }
        .input-section {
            display: flex;
            margin-bottom: 20px;
        }
        #taskInput {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px 0 0 8px;
            outline: none;
            font-size: 16px;
        }
        #addButton {
            padding: 12px 20px;
            background-color: #4A90E2;
            color: white;
            border: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        #addButton:hover {
            background-color: #357ABD;
        }
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        li {
            background: #fdfdfd;
            border: 1px solid #eee;
            margin-bottom: 10px;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        /* 할 일을 클릭했을 때 (완료 처리) */
        li.completed span {
            text-decoration: line-through;
            color: #aaa;
        }
        li.completed {
            background: #f9f9f9;
        }
        .task-text {
            cursor: pointer;
            flex: 1;
            word-break: break-all;
        }
        .delete-btn {
            background: #FF5C5C;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
        }
        .delete-btn:hover {
            background: #E04848;
        }
    </style>
</head>
<body>

    <!-- [HTML] 웹페이지의 뼈대를 담당합니다 -->
    <div class="todo-container">
        <h1>✅ 오늘 할 일</h1>
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="새로운 할 일을 입력하세요...">
            <button id="addButton">추가</button>
        </div>
        <ul id="taskList">
            <!-- 자바스크립트를 통해 이곳에 할 일 목록이 추가됩니다 -->
        </ul>
    </div>

    <!-- [JavaScript] 웹페이지의 동작(기능)을 담당합니다 -->
    <script>
        // HTML 요소들을 가져옵니다.
        const taskInput = document.getElementById('taskInput');
        const addButton = document.getElementById('addButton');
        const taskList = document.getElementById('taskList');

        // 할 일을 추가하는 함수
        function addTask() {
            const taskText = taskInput.value.trim(); // 양쪽 공백 제거
            
            // 입력값이 없으면 경고창 띄우기
            if (taskText === '') {
                alert('할 일을 입력해주세요!');
                return;
            }

            // 새로운 리스트(li) 요소 만들기
            const li = document.createElement('li');
            
            // 할 일 글씨가 들어갈 span 요소 만들기
            const span = document.createElement('span');
            span.textContent = taskText;
            span.className = 'task-text';
            
            // 글씨를 클릭하면 완료(밑줄) 처리되게 하기
            span.addEventListener('click', function() {
                li.classList.toggle('completed');
            });

            // 삭제 버튼 만들기
            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = '삭제';
            deleteBtn.className = 'delete-btn';
            
            // 삭제 버튼을 누르면 리스트에서 지워지게 하기
            deleteBtn.addEventListener('click', function() {
                taskList.removeChild(li);
            });

            // 조립하기: li 안에 글씨와 삭제버튼 넣기, ul 안에 li 넣기
            li.appendChild(span);
            li.appendChild(deleteBtn);
            taskList.appendChild(li);

            // 입력창 비우기
            taskInput.value = '';
        }

        // '추가' 버튼을 클릭했을 때 작동
        addButton.addEventListener('click', addTask);

        // 엔터키를 쳤을 때도 작동하게 하기
        taskInput.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                addTask();
            }
        });
    </script>
</body>
</html>
